<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iian Kehn</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between antialiased selection:bg-slate-900/5 selection:text-slate-900 relative overflow-x-hidden">

    <!-- Subtle Background Pattern Geometric Grid -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a05_1px,transparent_1px),linear-gradient(to_bottom,#0f172a05_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] pointer-events-none"></div>

    <!-- Top Border Accent -->
    <div class="h-1.5 w-full bg-gradient-to-r from-zinc-200 via-slate-400 to-zinc-200"></div>

    <!-- Main Content Container -->
    <main class="flex-grow flex items-center justify-center px-6 py-12 relative z-10">
        <div class="max-w-xl w-full bg-white/60 backdrop-blur-md border border-slate-200/80 p-8 sm:p-12 rounded-3xl shadow-xl shadow-slate-100/50">
            
            <!-- Header Section -->
            <header class="mb-10">
                <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-slate-900 mb-3">
                    Iian Kehn
                </h1>
                <h3 class="text-lg font-medium text-slate-500 tracking-wide uppercase text-xs">
                    Amazon Regulated Waste Coordinator
                </h3>
                <div class="h-1 w-12 bg-slate-900 rounded-full mt-4"></div>
            </header>

            <!-- Social Links Section -->
            <section>
                <p class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">Connect</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    
                    <!-- Threads -->
                    <a href="#" class="flex items-center justify-between p-3.5 bg-white border border-slate-200 rounded-xl hover:border-slate-900 hover:shadow-sm transition-all duration-200 group">
                        <span class="font-medium text-slate-700 group-hover:text-slate-900">Threads</span>
                        <span class="text-slate-400 group-hover:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </a>

                    <!-- X -->
                    <a href="#" class="flex items-center justify-between p-3.5 bg-white border border-slate-200 rounded-xl hover:border-slate-900 hover:shadow-sm transition-all duration-200 group">
                        <span class="font-medium text-slate-700 group-hover:text-slate-900">X (Twitter)</span>
                        <span class="text-slate-400 group-hover:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </a>

                    <!-- Bluesky -->
                    <a href="#" class="flex items-center justify-between p-3.5 bg-white border border-slate-200 rounded-xl hover:border-slate-900 hover:shadow-sm transition-all duration-200 group">
                        <span class="font-medium text-slate-700 group-hover:text-slate-900">Bluesky</span>
                        <span class="text-slate-400 group-hover:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </a>

                    <!-- TikTok -->
                    <a href="#" class="flex items-center justify-between p-3.5 bg-white border border-slate-200 rounded-xl hover:border-slate-900 hover:shadow-sm transition-all duration-200 group">
                        <span class="font-medium text-slate-700 group-hover:text-slate-900">TikTok</span>
                        <span class="text-slate-400 group-hover:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </a>

                    <!-- YouTube -->
                    <a href="#" class="flex items-center justify-between p-3.5 bg-white border border-slate-200 rounded-xl hover:border-slate-900 hover:shadow-sm transition-all duration-200 group sm:col-span-2">
                        <span class="font-medium text-slate-700 group-hover:text-slate-900">YouTube</span>
                        <span class="text-slate-400 group-hover:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </a>

                </div>
            </section>
        </div>
    </main>

    <!-- Simple Minimal Footer -->
    <footer class="w-full text-center py-6 text-xs text-slate-400 tracking-wide z-10">
        <p>&copy; 2026 Iian Kehn. All rights reserved.</p>
    </footer>

</body>
</html>
